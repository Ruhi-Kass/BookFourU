<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Book4U</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <div class="logo">
            <img src="assets/logo.png" alt="Book4U">
        </div>
        <nav>
            <ul>
                <li><a href="index.html" class="back-btn">← Back to Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="login.html" class="active">Login</a></li>
            </ul>
        </nav>
    </header>

    <section class="login-section">
        <div class="login-container">
            <h2>Welcome Back!</h2>
            <p class="subtitle">Sign in to your Book4U account</p>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email address" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="login-btn">Sign In</button>

                <div class="login-extras">
                    <label>
                        <input type="checkbox" name="remember" id="rememberMe"> Remember me
                    </label>
                    <a href="#">Forgot Password?</a>
                </div>
            </form>

            <div class="signup-link">
                Don't have an account? <a href="signup.html">Sign up for free</a>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Book4U. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
